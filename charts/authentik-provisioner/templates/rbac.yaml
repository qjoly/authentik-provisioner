{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "authentik-provisioner.fullname" . }}
  labels:
    {{- include "authentik-provisioner.labels" . | nindent 4 }}
rules:
  # Write the OIDC client secrets provisioned for confidential clients.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "authentik-provisioner.fullname" . }}
  labels:
    {{- include "authentik-provisioner.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "authentik-provisioner.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "authentik-provisioner.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
