name: Release

# Publishes the container image to GHCR on version tags (e.g. v1.2.3).
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  chart:
    name: helm chart (OCI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Log in to GHCR
        run: helm registry login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"

      # Align the chart version/appVersion with the pushed tag (strip leading v).
      - name: Package chart
        run: |
          version="${GITHUB_REF_NAME#v}"
          helm package charts/authentik-provisioner \
            --version "$version" --app-version "$version" --destination dist

      - name: Push chart to GHCR
        run: |
          version="${GITHUB_REF_NAME#v}"
          helm push "dist/authentik-provisioner-${version}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"
