# ServiceAccount + Role granting the provisioner permission to write the OIDC
# client secrets it provisions. Scope it to the namespace where the secrets live.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: authentik-provisioner
  namespace: authentik
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: authentik-provisioner
  namespace: authentik
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: authentik-provisioner
  namespace: authentik
subjects:
  - kind: ServiceAccount
    name: authentik-provisioner
    namespace: authentik
roleRef:
  kind: Role
  name: authentik-provisioner
  apiGroup: rbac.authorization.k8s.io
